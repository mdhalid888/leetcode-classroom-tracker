<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LeetCode Class Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body class="light-theme">
    <div class="login-container">
        <div class="card-glass login-card animate-fade-in">
            <!-- Branding -->
            <div class="d-flex align-items-center justify-content-center mb-4">
                <span class="text-easy fs-1 me-2"><i class="bi bi-shield-lock-fill"></i></span>
                <span class="fs-2 fw-extrabold text-uppercase tracking-wider text-dark">Admin Access</span>
            </div>
            
            <h3 class="mb-2 text-dark">Portal Login</h3>
            <p class="text-secondary-custom fs-7 mb-4">Enter administrative credentials to manage stats updates and download reports.</p>
            
            <!-- Error messages -->
            <div id="errorContainer" style="display: none;">
                <div class="alert alert-danger alert-dismissible fade show rounded-3 fs-7 py-2 px-3 text-start" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="errorMsg"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 10px;"></button>
                </div>
            </div>

            <form id="adminLoginForm" class="text-start">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold text-secondary-custom fs-7">Admin Email</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom text-secondary-custom" style="border-radius: 20px 0 0 20px; border-right: none;">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input type="email" class="form-control login-input py-2 fs-6" id="email" name="email" placeholder="Enter your email" required style="border-radius: 0 20px 20px 0; border-left: none;">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-secondary-custom fs-7">Password</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom text-secondary-custom" style="border-radius: 20px 0 0 20px; border-right: none;">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" class="form-control login-input py-2 fs-6" id="password" name="password" placeholder="Enter your password" required style="border-radius: 0 20px 20px 0; border-left: none;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-easy text-dark fw-bold rounded-pill w-100 py-2.5 mt-2 fs-6">
                    Login Admin <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
            
            <div class="mt-4">
                <a href="index.html" id="studentPortalLink" class="text-decoration-none text-secondary-custom fs-7 fw-semibold">
                    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <!-- Configuration and core JS scripts -->
    <script src="js/config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isLocal = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.protocol === 'file:';
            
            const getPageUrl = (page) => {
                return isLocal ? page : page.replace('.html', '');
            };

            const studentLink = document.getElementById("studentPortalLink");
            if (studentLink) {
                studentLink.href = getPageUrl("index.html");
            }

            if (localStorage.getItem("admin_token")) {
                window.location.href = getPageUrl("admin.html");
                return;
            }
            
            const form = document.getElementById("adminLoginForm");
            const errorContainer = document.getElementById("errorContainer");
            const errorMsg = document.getElementById("errorMsg");
            
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errorContainer.style.display = "none";
                
                const emailVal = document.getElementById("email").value;
                const passwordVal = document.getElementById("password").value;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email: emailVal, password: passwordVal })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.status === "success") {
                        localStorage.setItem("admin_token", data.admin_token);
                        localStorage.setItem("admin_email", emailVal);
                        window.location.href = getPageUrl("admin.html");
                    } else {
                        errorMsg.textContent = data.message || "Invalid credentials.";
                        errorContainer.style.display = "block";
                    }
                } catch (err) {
                    errorMsg.textContent = "Unable to connect to the server. Please check if the backend is running.";
                    errorContainer.style.display = "block";
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
