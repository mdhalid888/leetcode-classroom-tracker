<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        window.location.href = "/";
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LeetCode Class Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body class="light-theme">
    <div class="login-container">
        <div class="card-glass login-card animate-fade-in">
            <!-- Branding -->
            <div class="d-flex align-items-center justify-content-center mb-4">
                <span class="text-easy fs-1 me-2"><i class="bi bi-code-slash"></i></span>
                <span class="fs-2 fw-extrabold text-uppercase tracking-wider text-dark">LC Tracker</span>
            </div>
            
            <h3 class="mb-2 text-dark">Classroom Login</h3>
            <p class="text-secondary-custom fs-7 mb-4">Enter your college registration number to access the LeetCode classroom statistics dashboard.</p>
            
            <!-- Error messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                        <div class="alert alert-danger alert-dismissible fade show rounded-3 fs-7 py-2 px-3 text-start" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ msg }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 10px;"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login_route') }}" method="POST" class="text-start">
                <div class="mb-4">
                    <label for="register_number" class="form-label fw-semibold text-secondary-custom fs-7">Registration Number</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom text-secondary-custom" style="border-radius: 20px 0 0 20px; border-right: none;">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control login-input py-2 fs-6" id="register_number" name="register_number" placeholder="Enter your registration number" required style="border-radius: 0 20px 20px 0; border-left: none;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-easy text-dark fw-bold rounded-pill w-100 py-2.5 mt-2 fs-6">
                    Enter Dashboard <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
